# Nginx reverse proxy pro Next.js (west-county-akce)
# Instalace:
#   sudo cp scripts/deploy/nginx-westcounty.conf /etc/nginx/sites-available/west-county-akce
#   sudo ln -sf /etc/nginx/sites-available/west-county-akce /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Před nasazením upravte server_name a případně SSL (certbot).

upstream west_county_next {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;

    # Nahraďte IP nebo produkční doménou
    server_name app.westcounty.cz _;

    client_max_body_size 50M;

    location / {
        proxy_pass http://west_county_next;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

# Po získání certifikátu (certbot) odkomentujte a upravte server_name:
#
# server {
#     listen 443 ssl http2;
#     listen [::]:443 ssl http2;
